site_name: InSAR Teaching Hub
site_description: Learning resources for InSAR — from fundamentals to time series analysis.
site_author: Danielle Lindsay

theme:
  name: material
  icon:
    logo: material/satellite-variant
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

not_in_nav: |
  getting-started.md

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Resources:
    - resources.md
    - Conferences and Scholarships: community.md
  - Workflows:
    - workflows/index.md
    - Environment Setup: workflows/environment-setup.md
    - Single Interferogram (ASF OnDemand): workflows/single-interferogram.md
    - Time Series (HyP3 + MintPy): workflows/hyp3-mintpy.md
    - Time Series (LiCSAR + LiCSBAS): workflows/licsar-licsbas.md
    - PyGMT Maps: tools/pygmt-maps.md
  - Literature:
    - Key Papers: literature/keystone-papers.md
    - NZ InSAR Papers: literature/nz-papers.md
    - Ionospheric Effects: concepts/ionosphere.md
  - About: about.md
