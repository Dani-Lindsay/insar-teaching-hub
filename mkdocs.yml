site_name: InSAR Teaching Hub
site_description: Learning resources for InSAR — from fundamentals to time series analysis.
site_author: Danielle Lindsay

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - History of InSAR: history.md
  - Getting Started: getting-started.md
  - Resources: resources.md
  - Workflows:
    - Single Interferogram (ASF OnDemand): workflows/single-interferogram.md
    - Time Series (HyP3 + MintPy): workflows/hyp3-mintpy.md
    - Time Series (LiCSAR + LiCSBAS): workflows/licsar-licsbas.md
  - Concepts:
    - Ionospheric Effects: concepts/ionosphere.md
  - Literature:
    - Keystone Papers: literature/keystone-papers.md
    - NZ InSAR Papers: literature/nz-papers.md
  - Tools:
    - PyGMT Maps: tools/pygmt-maps.md
  - Community: community.md
  - About: about.md
